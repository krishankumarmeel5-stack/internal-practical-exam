<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dropbox</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    
    <div class="nav-left">
        <button class="btn-outline small">Get Dropbox Basic</button>
    </div>

    <div class="nav-center">
        <div class="logo-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Dropbox_Icon.svg" alt="logo">
            <span>Dropbox</span>
        </div>
    </div>

    <div class="nav-right">
        <a href="#">Compare plans</a>
        <a href="#">Sign in</a>
    </div>

</header>

<section class="hero-wrapper">
    <div class="hero">

        <div class="hero-text">
            <h1>Work better, safer,<br>together.</h1>

            <p class="desc">
                Dropbox Business simplifies your work, with a central place 
                to access and share files.
            </p>

            <div class="buttons">
                <button class="btn-primary">Try Dropbox Business free</button>
                <button class="btn-outline">Get Dropbox Basic</button>
            </div>

            <p class="small-text">
                Try Dropbox Business free for 30 days. No credit card needed.
            </p>
        </div>

        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c" alt="workspace" width="1000px" height="450px">
        </div>

    </div>
</section>

</body>
</html>
